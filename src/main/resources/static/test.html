<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - TestJava2BBDD</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🎓 TestJava2BBDD</h1>
            <p id="tema-titulo">Tema</p>
        </div>

        <!-- Content -->
        <div class="content">
            <!-- Seleccionar dificultad -->
            <div id="dificultad-section" class="form-section">
                <h2>¿Cómo te encuentras hoy?</h2>
                <div class="dificultad-options">
                    <button onclick="iniciarTest(1)" class="btn btn-secondary">a) Necesito calentarme (Fácil)</button>
                    <button onclick="iniciarTest(2)" class="btn btn-secondary">b) Voy bien (Normal)</button>
                    <button onclick="iniciarTest(3)" class="btn btn-secondary">c) Dame un reto (Difícil)</button>
                </div>
                <button onclick="volverAlMenu()" class="btn btn-outline">← Volver al menú</button>
            </div>

            <!-- Pregunta -->
            <div id="pregunta-section" style="display:none;">
                <div class="pregunta-container">
                    <h2 id="pregunta-texto"></h2>

                    <div class="opciones">
                        <label class="opcion">
                            <input type="radio" name="respuesta" value="a">
                            <span id="opcion-a"></span>
                        </label>
                        <label class="opcion">
                            <input type="radio" name="respuesta" value="b">
                            <span id="opcion-b"></span>
                        </label>
                        <label class="opcion">
                            <input type="radio" name="respuesta" value="c">
                            <span id="opcion-c"></span>
                        </label>
                        <label class="opcion">
                            <input type="radio" name="respuesta" value="d">
                            <span id="opcion-d"></span>
                        </label>
                    </div>

                    <button onclick="enviarRespuesta()" class="btn btn-primary">Enviar respuesta</button>
                </div>

                <!-- Progreso -->
                <div class="progress">
                    <p id="progreso-texto"></p>
                    <div class="progress-bar">
                        <div id="progreso-barra"></div>
                    </div>
                </div>
            </div>

            <!-- Feedback -->
            <div id="feedback-section" style="display:none;">
                <div class="feedback-container">
                    <div id="feedback-resultado" class="feedback-resultado"></div>
                    <div id="feedback-mensaje" class="feedback-mensaje"></div>
                    <div id="feedback-explicacion" class="feedback-explicacion"></div>

                    <button onclick="siguientePregunta()" class="btn btn-primary">Siguiente pregunta</button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p id="usuario-info"></p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/test.js"></script>
</body>
</html>
