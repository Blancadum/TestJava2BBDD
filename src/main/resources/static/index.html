<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TestJava2BBDD - Tests Adaptativos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🎓 TestJava2BBDD</h1>
            <p>Tests Adaptativos de Java y Bases de Datos</p>
        </div>

        <!-- Content -->
        <div class="content">
            <div id="menu-section">
                <!-- Saludo -->
                <div id="saludo" class="saludo"></div>

                <!-- Entrada de nombre -->
                <div id="nombre-section" class="form-section" style="display:none;">
                    <h2>¿Cuál es tu nombre?</h2>
                    <input type="text" id="nombre-input" placeholder="Escribe tu nombre" class="input-field">
                    <button onclick="guardarNombre()" class="btn btn-primary">Continuar</button>
                </div>

                <!-- Lista de temas -->
                <div id="temas-section" style="display:none;">
                    <h2>📚 Elige un tema</h2>
                    <div id="temas-grid" class="temas-grid">
                        <!-- Temas se cargan aquí -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>TestJava2BBDD © 2024 - Aprende practicando</p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
